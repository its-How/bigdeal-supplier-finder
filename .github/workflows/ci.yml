name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Package structure check
        run: |
          test -f bigdeal-supplier-finder/SKILL.md
          test -d bigdeal-supplier-finder/references
          test -f README.md
          test -f LICENSE
          echo "Package structure OK"

      - name: SKILL.md syntax check
        run: |
          node -e "
            const fs = require('fs');
            const skill = fs.readFileSync('bigdeal-supplier-finder/SKILL.md', 'utf8');
            if (!skill.includes('Live Run')) throw new Error('Missing Live Run section');
            if (skill.includes('npm test')) throw new Error('Contains npm test reference');
            console.log('SKILL.md OK');
          "

      - name: SPEC.md check
        run: |
          node -e "
            const fs = require('fs');
            const spec = fs.readFileSync('bigdeal-supplier-finder/SPEC.md', 'utf8');
            if (!spec.includes('file-distribution')) throw new Error('Missing file-distribution mention');
            if (spec.includes('npm test')) throw new Error('Contains npm test reference');
            console.log('SPEC.md OK');
          "

      - name: Package dry run
        run: npm pack --dry-run
