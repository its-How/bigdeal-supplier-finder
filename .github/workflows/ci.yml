name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Test
        run: npm test

      - name: Syntax check
        run: npm run check

      - name: Fixture
        run: npm run fixture

      - name: Package dry run
        run: npm pack --dry-run
